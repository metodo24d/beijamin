<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bem-vindo</title>

<!-- Redirecionamento automático -->
<meta http-equiv="refresh" content="1; url=https://foliabet777.com">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    font-family:Arial, Helvetica, sans-serif;
    color:white;
}

.container{
    text-align:center;
}

.logo{
    font-size:40px;
    font-weight:bold;
    letter-spacing:2px;
}

.loading{
    margin-top:15px;
    opacity:0.7;
}

.loader{
    margin-top:25px;
    border:3px solid rgba(255,255,255,0.2);
    border-top:3px solid white;
    border-radius:50%;
    width:35px;
    height:35px;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
Carregando...
</div>

<div class="loading">
Você está sendo redirecionado
</div>

<div class="loader"></div>

</div>

<script>

setTimeout(function(){
    window.location.href = "https://foliabet777.com";
},1000);

</script>

</body>
</html>
